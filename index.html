<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Travel Companion</title>
<meta name="theme-color" content="#b9531a" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body>
<header class="top">
  <div class="brand">Travel <em>Companion</em></div>
  <nav id="triptabs"></nav>
</header>
<section id="hero"></section>
<nav id="viewtabs"></nav>
<main><div id="view"><p class="muted">Loading…</p></div></main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script type="module" src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  // Auto-apply new deploys: when an updated SW takes control, reload once so the
  // fresh shell shows immediately (no manual hard-refresh needed).
  let _reloaded;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_reloaded) return; _reloaded = true; location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update().catch(() => {});
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000); // re-check hourly
    }).catch(() => {});
  });
}
</script>
</body>
</html>
